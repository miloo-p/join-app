<!-- Right Side: Contact details view (initially empty) -->
<main class="contacts-main-content">

    <!-- Header Area (Always visible) -->
    <div class="contacts-header">
        <h1 class="main-title">Contacts</h1>
        <div class="header-divider"></div>
        <span class="slogan">Better with a team</span>
    </div>

    <!-- Details Box (State B: Visible when a contact is selected) -->
    <!-- TODO: Jonathan will toggle this block dynamically via Angular condition later -->
    <div class="contact-details-view">

        <!-- Profile Info & Buttons Header -->
        <div class="details-profile-header">
            <div class="large-avatar bg-tangerine">AM</div>
            <div class="profile-name-actions">
                <h2 class="profile-name">Anton Mayer</h2>
                <div class="action-buttons">
                    <button class="contact-edit-btn">
                        <span class="edit-icon"></span>
                        Edit
                    </button>
                    <button class="contact-delete-btn">
                        <span class="delete-icon"></span>
                        Delete
                    </button>
                </div>
            </div>
        </div>

        <!-- Contact Information Section -->
        <div class="info-title">
            <h3 class="section-subtitle">Contact Information</h3>
        </div>

        <!-- Specific Contact Data Fields -->
        <div class="info-data-block">
            <div class="data-group">
                <span class="label">Email</span>
                <a href="mailto:antonm@gmail.com" class="value email-link">antonm@gmail.com</a>
            </div>
            <div class="data-group">
                <span class="label">Phone</span>
                <span class="value">+49 1111 111 11 1</span>
            </div>
        </div>
    </div>
</main>
