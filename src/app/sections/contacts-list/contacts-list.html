<!-- Left Side: Contacts List -->
<aside class="contacts-sidebar">

    <!--Button top-->
    <div class="action-area">
        <button class="add-contact-btn">
            Add new Contact
            <span class="contact-btn-icon"></span>
        </button>
    </div>

    <!--Scroll area for the list of contacts-->
    <div class="contacts-scroll-area">
        <!--Placeholder for alphabetical dividers and contacts-->
        <!-- TODO: Angular loop to be implemented after TypeScript data integration -->
        <div class="alphabet-section">
            <span class="letter-badge">A</span>

            <!-- Dummy contact card 1 -->
            <!-- Use 'active' class for the highlighted state (e.g., Anton Mayer) -->
            <div class="contact-card active">
                <div class="avatar bg-tangerine">AM
                </div>
                <div class="contact-info">
                    <span class="name">Anton Mayer</span>
                    <span class="email">antonm@gmail.com</span>
                </div>
            </div>

            <!-- Dummy contact card 2 -->
            <div class="contact-card">
                <div class="avatar bg-amethyst">AS
                </div>
                <div class="contact-info">
                    <span class="name">Anja Schulz</span>
                    <span class="email">schulz@hotmail.com</span>
                </div>
            </div>
        </div>
    </div>
</aside>
