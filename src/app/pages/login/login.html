<section class="auth">
    <header class="auth__header" [class.auth__header--visible]="!isAnimating()">
        <div class="auth__header-nav">
            <span class="auth__header-text">Not a Join user?</span>
            <app-button [text]="'Sign up'" [variant]="'primary'" [size]="'md'" [buttonType]="'button'"
                class="auth__custom-btn auth__custom-btn--signup" (click)="onSignupClick()">
            </app-button>
        </div>
    </header>

    </div>

    <div class="auth__card" [class.auth__card--visible]="!isAnimating()">
        <div class="auth__card-header">
            <h1 class="auth__title">Log in</h1>
            <div class="auth__underline"></div>
        </div>

        <form class="auth__form" (submit)="onLoginSubmit($event)" novalidate>

                    <input type="email" placeholder="Email" class="auth__input" (input)="onEmailInput($event)"
                        required />

                </div>

                        (input)="onPasswordInput($event)" required />

                    @if (showError()) {
                    <span class="auth__error-text">Check your email and password. Please try again.</span>
                    }
                </div>
            </div>

            <div class="auth__action-group">
                <app-button [text]="'Log in'" [variant]="'primary'" [size]="'md'" [buttonType]="'submit'"
                    class="auth__custom-btn auth__custom-btn--login">
                </app-button>

                <app-button [text]="'Guest Log in'" [variant]="'secondary'" [size]="'md'" [buttonType]="'button'"
                    class="auth__custom-btn auth__custom-btn--guest" (click)="onGuestLogin()">
                </app-button>
            </div>
        </form>
    </div>

    <footer class="auth__footer" [class.auth__footer--visible]="!isAnimating()">
        <div class="auth__footer-nav">
            <a (click)="onPrivacyPolicyClick()" class="auth__footer-link">Privacy Policy</a>
            <a (click)="onLegalNoticeClick()" class="auth__footer-link">Legal notice</a>
        </div>
    </footer>
</section>
