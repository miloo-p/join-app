<section class="board">
  <header class="board__header">
    <h2 class="board__title">Board</h2>
    <div class="board__interaction">
      <input placeholder="Find Task" class="board__search" />
      <app-button
        text="Add task"
        variant="primary"
        size="md"
        width="full"
        (click)="openAddTaskDialog('todo')"
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <mask
            id="mask0_75592_9975"
            style="mask-type: alpha"
            maskUnits="userSpaceOnUse"
            x="0"
            y="0"
            width="24"
            height="24"
          >
            <rect width="24" height="24" fill="#D9D9D9" />
          </mask>
          <g mask="url(#mask0_75592_9975)">
            <path
              d="M11 13H6C5.71667 13 5.47917 12.9042 5.2875 12.7125C5.09583 12.5208 5 12.2833 5 12C5 11.7167 5.09583 11.4792 5.2875 11.2875C5.47917 11.0958 5.71667 11 6 11H11V6C11 5.71667 11.0958 5.47917 11.2875 5.2875C11.4792 5.09583 11.7167 5 12 5C12.2833 5 12.5208 5.09583 12.7125 5.2875C12.9042 5.47917 13 5.71667 13 6V11H18C18.2833 11 18.5208 11.0958 18.7125 11.2875C18.9042 11.4792 19 11.7167 19 12C19 12.2833 18.9042 12.5208 18.7125 12.7125C18.5208 12.9042 18.2833 13 18 13H13V18C13 18.2833 12.9042 18.5208 12.7125 18.7125C12.5208 18.9042 12.2833 19 12 19C11.7167 19 11.4792 18.9042 11.2875 18.7125C11.0958 18.5208 11 18.2833 11 18V13Z"
              fill="currentColor"
            />
          </g>
        </svg>
      </app-button>
    </div>
  </header>

  <div class="board__content">
    @for (column of boardColumns; track column.id) {
      <div class="board__column">
        <div class="board__column-header">
          <h4 class="board__column-title">{{ column.title }}</h4>

          @if (column.hasAddBtn) {
            <button class="board__add-btn" (click)="openAddTaskDialog(column.id)">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <rect
                  x="1"
                  y="1"
                  width="22"
                  height="22"
                  rx="7"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <path d="M12 8V16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <path
                  d="M16 12.0754L8 12.0754"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          }
        </div>

        <ul class="board__task-list">
          @for (task of column.tasks; track task.id) {
            <li class="board__task" (click)="openTaskDetails(task)">
              <app-task-card [task]="task"></app-task-card>
            </li>
          } @empty {
            <li class="board__empty-state">
              <span class="board__empty-long hidden-xl">{{ column.emptyText }}</span>
              <span class="board__empty-short">No tasks</span>
            </li>
          }
        </ul>
      </div>
    }
  </div>
</section>

<app-task-dialog #addTaskDialog></app-task-dialog>
<app-task-detail #taskDetail (editTask)="openEditTaskDialog($event)"></app-task-detail>
