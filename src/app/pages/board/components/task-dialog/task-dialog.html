<dialog #dialog class="add-task-dialog" (click)="closeDialog()">
  <div class="add-task-dialog__content" (click)="$event.stopPropagation()">
    <!-- HEADER -->
    <header class="add-task-dialog__header">
      <button class="add-task-dialog__close-btn" (click)="closeDialog()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
    </header>

    <!-- BODY (Scroll Area) -->
    <div class="add-task-dialog__body">
      <app-add-task [task]="currentTask" (taskSaved)="closeDialog()" [columnId]="currentColumnId"
        [isDialogMode]="true"></app-add-task>
    </div>

    <!-- FOOTER -->
    <footer class="add-task-dialog__footer">
      @if (!currentTask) {
      <app-button text="Clear" variant="outline" size="md" width="auto" buttonType="button" fontWeight="regular"
        (btnClick)="clearTask()">
        <svg width="18" height="18" viewBox="4 4 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M11.9998 13.4L7.0998 18.3C6.91647 18.4834 6.68314 18.575 6.3998 18.575C6.11647 18.575 5.88314 18.4834 5.6998 18.3C5.51647 18.1167 5.4248 17.8834 5.4248 17.6C5.4248 17.3167 5.51647 17.0834 5.6998 16.9L10.5998 12L5.6998 7.10005C5.51647 6.91672 5.4248 6.68338 5.4248 6.40005C5.4248 6.11672 5.51647 5.88338 5.6998 5.70005C5.88314 5.51672 6.11647 5.42505 6.3998 5.42505C6.68314 5.42505 6.91647 5.51672 7.0998 5.70005L11.9998 10.6L16.8998 5.70005C17.0831 5.51672 17.3165 5.42505 17.5998 5.42505C17.8831 5.42505 18.1165 5.51672 18.2998 5.70005C18.4831 5.88338 18.5748 6.11672 18.5748 6.40005C18.5748 6.68338 18.4831 6.91672 18.2998 7.10005L13.3998 12L18.2998 16.9C18.4831 17.0834 18.5748 17.3167 18.5748 17.6C18.5748 17.8834 18.4831 18.1167 18.2998 18.3C18.1165 18.4834 17.8831 18.575 17.5998 18.575C17.3165 18.575 17.0831 18.4834 16.8998 18.3L11.9998 13.4Z"
            fill="#2A3647" />
        </svg>
      </app-button>

      <app-button text="Create Task" variant="primary" size="md" width="auto" buttonType="button" class="createTaskBtn"
        (btnClick)="saveTask()">
        <svg width="18" height="18" viewBox="0 0 37 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3.5 14.566L14.7288 25.6321L33.4434 3.5" stroke="white" stroke-width="3" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </app-button>
      } @else {
      <app-button text="Ok" variant="primary" size="md" width="auto" buttonType="button" class="createTaskBtn"
        (btnClick)="saveTask()">
        <svg width="18" height="18" viewBox="0 0 37 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3.5 14.566L14.7288 25.6321L33.4434 3.5" stroke="white" stroke-width="3" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </app-button>
      }
    </footer>
  </div>
</dialog>
