<div class="contacts-layout" [class.contacts-layout--has-contact]="!!activeContact()">
    <app-contacts-list (contactSelected)="handleContactSelection($event)"></app-contacts-list>
    <app-contacts-detail [contact]="activeContact()" (edit)="openEditContact($event)"
        (delete)="handleDeleteContact($event)" (close)="handleBackToList()">
    </app-contacts-detail>
</div>

<app-edit-contact *ngIf="isEditContactOpen()" [contact]="activeContact()" (closeOverlay)="closeEditContact()"
    (saveContact)="handleContactUpdate($event)" (deleteContact)="handleDeleteContact($event)">
</app-edit-contact>
