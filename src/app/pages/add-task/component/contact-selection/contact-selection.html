<section class="contactList">
    @for (contact of contactDatabase.contacts(); track contact.id) {
    <div class="contactList__contact" [class.contactList__contact--selected]="isSelected(contact.id)"
        (click)="toggleContact(contact.id)">

        <span class="contactList__contact__profileIcon">

        </span>

        <span class="contactList__contact__name">
            {{ contact.firstname }} {{ contact.lastname }}
        </span>

        <div class="contactList__contact__checkbox">
            @if (isSelected(contact.id)) {
            <svg width="24" height="24" viewBox="0 0 24 24" fill="transparent" xmlns="http://www.w3.org/2000/svg">
                <rect width="24" height="24" rx="12" fill="transparent" />
                <path d="M20 11V17C20 18.6569 18.6569 20 17 20H7C5.34315 20 4 18.6569 4 17V7C4 5.34315 5.34315 4 7 4H15"
                    stroke="white" stroke-width="2" stroke-linecap="round" />
                <path d="M8 12L12 16L20 4.5" stroke="white" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            } @else {
            <svg width="24" height="24" viewBox="0 0 24 24" fill="transparent" xmlns="http://www.w3.org/2000/svg">
                <rect width="24" height="24" rx="12" fill="transparent" />
                <rect x="4" y="4" width="16" height="16" rx="3" stroke="#2A3647" stroke-width="2" />
            </svg>
            }
        </div>
    </div>
    }
</section>
